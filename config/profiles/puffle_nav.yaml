name: puffle_nav

manifest: puffle_nav

resources:
  primary_robot: base
  face_camera: arducam_001
  scene_camera: arducam_001
  interaction_display: screen_001

display:
  enabled: true

navigation:
  locations_file: lab.json
  startup_patrol_route: []

tools:
  enabled_tool_ids:
    - navigation.navigate_to_location
    - navigation.navigate_to_location_blocking
    - navigation.navigate_relative
    - navigation.follow_waypoints
    - navigation.cancel
    - navigation.stop_patrol
    - navigation.get_current_location
    - dock.charging

employee_directory:
  enabled: true

knowledge_bases: []

slack_memory:true
  enabled: false

face_recognition:
  enabled: true
  db_path: var/face_recognition
  loop_interval_sec: 0.05
  recognition_threshold: 0.6
  recognition_margin_threshold: 0.20
  live_image_enabled: false
  owner_turn:
    enabled: false
  depth_gate:
    enabled: false
  attention_gate:
    enabled: true
  proactive_greeting:
    recognized_enabled: false
    unknown_enabled: false
    require_attention: true
  preference_extraction:
    enabled: false

speaker_recognition:
  enabled: true

realtime:
  prompt_file: puffle_nav_prompt.md
  model: gpt-realtime-1.5
  voice: cedar
  audio_output_speed: 1.0
  transcription_model: gpt-4o-mini-transcribe
  input_device: pipewire
  output_device: pipewire
  noise_reduction: near_field
  vad_threshold: 0.8
  silence_grace_period: 1.0
  wake_word: hey puffle
  wake_threshold: 0.5
  wake_window_sec: 5.0
  input_sample_rate: 24000
  output_sample_rate: 24000
  input_block_size: 2400
  admission:
    block_during_speaking: true
    block_during_engaged: true
    open_on_face_presence: false
    open_on_attention_presence: true
    open_on_interaction_states:
      - alert
    open_on_wake_window: true

engagement:
  coalescer_debounce_sec: 0.4
  coalescer_max_wait_sec: 2.0
  alert_timeout_sec: 15.0
  cooldown_sec: 7.0
  speaking_timeout_sec: 30.0
  startup_patrol_delay_sec: 2.0
  patrol_next_hop_delay_sec: 5.0

startup:
  prepare_robot: false
  fail_on_prepare_error: true

embodiment:
  gestures:
    enabled: false

battery:
  enabled: true
  low_battery_pct: 10.0
  charging_ready_pct: 100.0
