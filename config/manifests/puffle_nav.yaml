id: puffle_nav
display_name: Puffle Nav

providers:
  - id: puffle-go2
    transport: zenoh
    key_prefix: argos/providers/puffle-go2
    connect_endpoints: []

  - id: puffle-go2-display
    transport: http
    key_prefix: argos/providers/puffle-go2-display
    connect_endpoints:
      - http://localhost:4173

resources:
  - id: base
    kind: robot_base
    family: unitree_go2
    provider: puffle-go2
    capabilities:
      - battery.state
      - transform.lookup
      - navigation.goal
      - dock.charging
      - voice_command.publish

  - id: arducam_001
    kind: camera
    hardware: arducam
    provider: puffle-go2
    capabilities:
      - camera.rgb
      - camera.intrinsics

  - id: screen_001
    kind: display
    hardware: puffle_screen
    provider: puffle-go2-display
    capabilities:
      - display.command
      - display.interaction
