<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="355" viewBox="0 0 1100 355">
  <rect width="1100" height="355" rx="22" fill="#fbfaf7"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .title{font:700 19px Arial,sans-serif;fill:#111827}
      .body{font:400 14px Arial,sans-serif;fill:#374151}
      .step{stroke:#cbd5e1;stroke-width:2}
      .line{stroke:#475569;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect x="40" y="95" width="165" height="135" rx="18" fill="#dbeafe" class="step"/>
  <text x="122" y="135" text-anchor="middle" class="title">1. Listen?</text>
  <text x="122" y="166" text-anchor="middle" class="body">wake word, speech,</text>
  <text x="122" y="188" text-anchor="middle" class="body">attention, robot state</text>

  <rect x="255" y="95" width="165" height="135" rx="18" fill="#ccfbf1" class="step"/>
  <text x="337" y="135" text-anchor="middle" class="title">2. Capture</text>
  <text x="337" y="166" text-anchor="middle" class="body">one spoken turn,</text>
  <text x="337" y="188" text-anchor="middle" class="body">then close it cleanly</text>

  <rect x="470" y="95" width="165" height="135" rx="18" fill="#fee2e2" class="step"/>
  <text x="552" y="135" text-anchor="middle" class="title">3. Who?</text>
  <text x="552" y="166" text-anchor="middle" class="body">combine face and</text>
  <text x="552" y="188" text-anchor="middle" class="body">voice evidence</text>

  <rect x="685" y="95" width="165" height="135" rx="18" fill="#fef3c7" class="step"/>
  <text x="767" y="135" text-anchor="middle" class="title">4. Context</text>
  <text x="767" y="166" text-anchor="middle" class="body">person, robot,</text>
  <text x="767" y="188" text-anchor="middle" class="body">memory if enabled</text>

  <rect x="900" y="95" width="165" height="135" rx="18" fill="#dcfce7" class="step"/>
  <text x="982" y="135" text-anchor="middle" class="title">5. Respond</text>
  <text x="982" y="166" text-anchor="middle" class="body">speak, display,</text>
  <text x="982" y="188" text-anchor="middle" class="body">gesture, use tools</text>

  <path d="M205 162 L255 162" class="line"/>
  <path d="M420 162 L470 162" class="line"/>
  <path d="M635 162 L685 162" class="line"/>
  <path d="M850 162 L900 162" class="line"/>

  <rect x="250" y="270" width="600" height="45" rx="16" fill="#e5e7eb" stroke="#cbd5e1"/>
  <text x="550" y="298" text-anchor="middle" class="body">The model responds only after Argos has shaped the turn, owner, context, and allowed actions.</text>
</svg>
