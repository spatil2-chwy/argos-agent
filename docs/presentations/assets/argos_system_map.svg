<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520">
  <rect width="1100" height="520" rx="22" fill="#fbfaf7"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
    <style>
      .title{font:700 24px Arial,sans-serif;fill:#1f2937}
      .body{font:400 18px Arial,sans-serif;fill:#374151}
      .small{font:400 15px Arial,sans-serif;fill:#4b5563}
      .box{stroke:#cbd5e1;stroke-width:2}
      .line{stroke:#4b5563;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect x="405" y="165" width="290" height="150" rx="24" fill="#263241" class="box"/>
  <text x="550" y="225" text-anchor="middle" class="title" fill="#ffffff">Realtime AI</text>
  <text x="550" y="258" text-anchor="middle" class="body" fill="#e5e7eb">speech, reasoning,</text>
  <text x="550" y="286" text-anchor="middle" class="body" fill="#e5e7eb">tool choices</text>

  <rect x="55" y="55" width="245" height="110" rx="18" fill="#dbeafe" class="box"/>
  <text x="178" y="100" text-anchor="middle" class="title">People nearby</text>
  <text x="178" y="130" text-anchor="middle" class="small">speech, faces, attention</text>

  <rect x="55" y="355" width="245" height="110" rx="18" fill="#dcfce7" class="box"/>
  <text x="178" y="400" text-anchor="middle" class="title">Robot body</text>
  <text x="178" y="430" text-anchor="middle" class="small">speaker, motion, camera, display</text>

  <rect x="800" y="55" width="245" height="110" rx="18" fill="#fee2e2" class="box"/>
  <text x="923" y="98" text-anchor="middle" class="title">Identity + memory</text>
  <text x="923" y="128" text-anchor="middle" class="small">who is speaking, what to recall</text>

  <rect x="800" y="355" width="245" height="110" rx="18" fill="#fef3c7" class="box"/>
  <text x="923" y="400" text-anchor="middle" class="title">Operator view</text>
  <text x="923" y="430" text-anchor="middle" class="small">latency, logs, review, safety</text>

  <rect x="390" y="35" width="320" height="85" rx="18" fill="#ccfbf1" class="box"/>
  <text x="550" y="72" text-anchor="middle" class="title">Argos local control</text>
  <text x="550" y="100" text-anchor="middle" class="small">listening, state, tools, playback</text>

  <path d="M300 112 C345 130 370 165 405 205" class="line"/>
  <path d="M300 400 C355 365 372 318 405 285" class="line"/>
  <path d="M695 205 C735 165 762 130 800 112" class="line"/>
  <path d="M695 285 C735 318 762 365 800 400" class="line"/>
  <path d="M550 120 L550 165" class="line"/>
  <path d="M405 245 C350 245 320 225 282 166" class="line"/>
  <path d="M550 315 L550 382 C550 410 592 410 800 410" class="line"/>
</svg>
