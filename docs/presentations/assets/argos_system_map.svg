<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="610" viewBox="0 0 1100 610" role="img" aria-labelledby="title desc">
  <title id="title">Argos-agent architecture system map</title>
  <desc id="desc">Diagram showing the local control harness between people, the realtime model, robot providers, Tailwag identity and memory, and operator visibility.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .bg{fill:#f8fafc}
      .frame{fill:#ffffff;stroke:#d8dee8;stroke-width:1.5}
      .node{fill:#ffffff;stroke-width:1.6;filter:url(#shadow)}
      .center{fill:#172033;stroke:#172033;filter:url(#shadow)}
      .title{font:700 25px Arial,sans-serif;fill:#111827}
      .label{font:700 18px Arial,sans-serif;fill:#111827}
      .body{font:400 14px Arial,sans-serif;fill:#475569}
      .centerTitle{font:700 26px Arial,sans-serif;fill:#ffffff}
      .centerBody{font:400 15px Arial,sans-serif;fill:#dbe4f0}
      .tag{font:700 12px Arial,sans-serif;letter-spacing:.6px;fill:#64748b}
      .line{stroke:#64748b;stroke-width:2.8;fill:none;marker-end:url(#arrow)}
      .softLine{stroke:#94a3b8;stroke-width:1.8;fill:none;stroke-dasharray:5 6}
      .chipText{font:700 12px Arial,sans-serif;fill:#334155}
    </style>
  </defs>

  <rect width="1100" height="610" rx="10" class="bg"/>
  <rect x="28" y="28" width="1044" height="554" rx="10" class="frame"/>

  <text x="60" y="70" class="tag">SYSTEM BOUNDARY</text>
  <text x="60" y="105" class="title">Argos-agent architecture: model plus control harness</text>

  <rect x="390" y="240" width="320" height="180" rx="10" class="center"/>
  <text x="550" y="292" text-anchor="middle" class="centerTitle">Local harness</text>
  <text x="550" y="325" text-anchor="middle" class="centerBody">local admission, turn state,</text>
  <text x="550" y="349" text-anchor="middle" class="centerBody">tool execution, playback,</text>
  <text x="550" y="373" text-anchor="middle" class="centerBody">display and ownership policy</text>

  <rect x="62" y="225" width="246" height="116" rx="10" class="node" stroke="#60a5fa"/>
  <text x="185" y="264" text-anchor="middle" class="label">People nearby</text>
  <text x="185" y="292" text-anchor="middle" class="body">speech, faces, attention</text>
  <text x="185" y="314" text-anchor="middle" class="body">and social context</text>

  <rect x="62" y="412" width="246" height="116" rx="10" class="node" stroke="#34d399"/>
  <text x="185" y="451" text-anchor="middle" class="label">Robot body</text>
  <text x="185" y="479" text-anchor="middle" class="body">speaker, mic, camera,</text>
  <text x="185" y="501" text-anchor="middle" class="body">motion and display</text>

  <rect x="427" y="134" width="246" height="96" rx="10" class="node" stroke="#38bdf8"/>
  <text x="550" y="171" text-anchor="middle" class="label">Realtime session</text>
  <text x="550" y="199" text-anchor="middle" class="body">speech, reasoning, tool intent</text>

  <rect x="792" y="225" width="246" height="116" rx="10" class="node" stroke="#f59e0b"/>
  <text x="915" y="264" text-anchor="middle" class="label">Tailwag</text>
  <text x="915" y="292" text-anchor="middle" class="body">identity, biometric references,</text>
  <text x="915" y="314" text-anchor="middle" class="body">person context and memory</text>

  <rect x="792" y="412" width="246" height="116" rx="10" class="node" stroke="#fb7185"/>
  <text x="915" y="451" text-anchor="middle" class="label">Operator view</text>
  <text x="915" y="479" text-anchor="middle" class="body">latency markers, logs,</text>
  <text x="915" y="501" text-anchor="middle" class="body">review and safety checks</text>

  <path d="M308 283 C338 283 357 296 390 316" class="line"/>
  <path d="M390 365 C355 402 334 460 308 470" class="line"/>
  <path d="M550 230 L550 240" class="line"/>
  <path d="M710 316 C742 296 762 283 792 283" class="line"/>
  <path d="M710 365 C749 403 772 461 792 470" class="line"/>
  <path d="M390 316 C350 302 326 284 308 267" class="softLine"/>
  <path d="M710 330 C744 330 766 319 792 300" class="softLine"/>

  <rect x="394" y="456" width="96" height="30" rx="8" fill="#e0f2fe" stroke="#7dd3fc"/>
  <text x="442" y="476" text-anchor="middle" class="chipText">audio</text>
  <rect x="504" y="456" width="96" height="30" rx="8" fill="#dcfce7" stroke="#86efac"/>
  <text x="552" y="476" text-anchor="middle" class="chipText">tools</text>
  <rect x="614" y="456" width="96" height="30" rx="8" fill="#fef3c7" stroke="#fcd34d"/>
  <text x="662" y="476" text-anchor="middle" class="chipText">memory</text>
</svg>
